<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Charger Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #f2f2f7;
        color: #1c1c1e;
        height: 100vh;
        overflow: hidden;
      }
      .screen {
        display: none;
        width: 100%;
        height: 100%;
        flex-direction: column;
      }
      .screen.active {
        display: flex;
      }
      #startScreen {
        justify-content: center;
        align-items: center;
        padding: 24px;
        text-align: center;
      }
      #startScreen h1 {
        font-size: 28px;
        margin-bottom: 8px;
        color: #007aff;
      }
      #startScreen p {
        font-size: 16px;
        color: #8e8e93;
        margin-bottom: 40px;
      }
      .mode-btn {
        width: 100%;
        max-width: 320px;
        padding: 20px;
        margin-bottom: 16px;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 14px;
        background: #007aff;
        color: #fff;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .mode-btn:active {
        background: #0051d5;
      }
      #scannerScreen {
        position: relative;
        background: #000;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      #scannerTopBar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.6);
      }
      #scanStatus {
        color: #fff;
        font-size: 16px;
        font-weight: 600;
      }
      #doneBtn {
        padding: 8px 16px;
        font-size: 15px;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        background: #ff3b30;
        color: #fff;
        cursor: pointer;
      }
      #reader {
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
      }
      #reader video {
        object-fit: cover !important;
        width: 100% !important;
        height: 100% !important;
      }
      #reader img {
        display: none !important;
      }
      #reader > div {
        border: none !important;
      }
      #reader qr-shaded-region {
        display: none !important;
      }
      #reader .qr-shaded-region {
        display: none !important;
      }
      #reader .shaded-region {
        display: none !important;
      }
      #scanOverlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        pointer-events: none;
        background: rgba(0, 0, 0, 0.35);
      }
      #scanOverlay::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 75vw;
        height: 18vh;
        border-radius: 8px;
        box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35);
        background: transparent;
      }
      #scanRect {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 75vw;
        height: 18vh;
        border: 3px solid #ff3b30;
        border-radius: 8px;
        transition: border-color 0.3s, box-shadow 0.3s;
        box-shadow: 0 0 20px rgba(255, 59, 48, 0.4), inset 0 0 20px rgba(255, 59, 48, 0.1);
      }
      #scanRect.state-red {
        border-color: #ff3b30;
        box-shadow: 0 0 20px rgba(255, 59, 48, 0.4), inset 0 0 20px rgba(255, 59, 48, 0.1);
      }
      #scanRect.state-blue {
        border-color: #007aff;
        box-shadow: 0 0 20px rgba(0, 122, 255, 0.5), inset 0 0 20px rgba(0, 122, 255, 0.15);
      }
      #scanRect.state-green {
        border-color: #34c759;
        box-shadow: 0 0 20px rgba(52, 199, 89, 0.5), inset 0 0 20px rgba(52, 199, 89, 0.15);
      }
      #scanLabel {
        position: absolute;
        top: calc(50% + 12vh);
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        opacity: 0.8;
        pointer-events: none;
      }
      #scanFeedback {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 16px 28px;
        background: rgba(52, 199, 89, 0.9);
        color: #fff;
        font-size: 20px;
        font-weight: 700;
        border-radius: 12px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 20;
      }
      #scanFeedback.show {
        opacity: 1;
      }
      #resultsScreen {
        padding: 16px;
        overflow-y: auto;
      }
      #resultsScreen h2 {
        font-size: 22px;
        margin-bottom: 12px;
        text-align: center;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 16px;
        font-size: 15px;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #e5e5ea;
      }
      th {
        background: #007aff;
        color: #fff;
        font-weight: 600;
      }
      td {
        color: #1c1c1e;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .empty-plot {
        color: #c7c7cc;
        font-style: italic;
      }
      .results-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .results-actions button {
        padding: 14px 22px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      #shareBtn {
        background: #34c759;
        color: #fff;
      }
      #downloadBtn {
        background: #5856d6;
        color: #fff;
      }
      #restartBtn {
        background: #8e8e93;
        color: #fff;
      }
      .no-data {
        text-align: center;
        color: #8e8e93;
        padding: 40px 16px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="startScreen" class="screen active">
      <h1>Charger Scanner</h1>
      <p>Select scanning mode</p>
      <button class="mode-btn" onclick="startMode('plotSerial')">
        Plot + Serial Number
      </button>
      <button class="mode-btn" onclick="startMode('serialOnly')">
        Only Serial Number
      </button>
    </div>
    <div id="scannerScreen" class="screen">
      <div id="scannerTopBar">
        <span id="scanStatus">Scan Plot</span>
        <button id="doneBtn" onclick="finishScanning()">Done</button>
      </div>
      <div id="reader"></div>
      <div id="scanOverlay"><div id="scanRect" class="state-red"></div><div id="scanLabel">Align barcode within frame</div></div>
      <div id="scanFeedback">Accepted</div>
    </div>
    <div id="resultsScreen" class="screen">
      <h2>Scan Results</h2>
      <div id="resultsContainer"></div>
      <div class="results-actions">
        <button id="shareBtn" onclick="shareResults()">Share as File</button>
        <button id="downloadBtn" onclick="downloadCSV()">Download CSV</button>
        <button id="restartBtn" onclick="restart()">Start Over</button>
      </div>
    </div>
    <script>
      let mode = "",
        entries = [],
        tempPlot = "",
        scanStep = "plot",
        scanner = null,
        lastScan = "",
        lastScanTime = 0;
      const DEBOUNCE_MS = 1500;
      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }
      function startMode(m) {
        mode = m;
        entries = [];
        tempPlot = "";
        scanStep = mode === "plotSerial" ? "plot" : "serial";
        updateScanStatus();
        showScreen("scannerScreen");
        startCamera();
      }
      function updateScanStatus() {
        document.getElementById("scanStatus").textContent =
          scanStep === "plot" ? "Scan Plot" : "Scan Serial Number";
      }
      function startCamera() {
        scanner = new Html5Qrcode("reader");

        const cfg = {
          fps: 30,
          qrbox: function (viewfinderWidth, viewfinderHeight) {
            return {
              width: Math.floor(viewfinderWidth * 0.9),
              height: Math.floor(viewfinderHeight * 0.4),
            };
          },
          formatsToSupport: [
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.CODE_93,
            Html5QrcodeSupportedFormats.CODABAR,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.ITF,
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.DATA_MATRIX,
          ],
        };

        scanner
          .start(
            { facingMode: "environment" },
            cfg,
            onScanSuccess,
            onScanError
          )
          .catch((e) => {
            alert("Camera start failed: " + e);
          });
      }
      let rectState = 'red';
      function setRectState(state) {
        const el = document.getElementById('scanRect');
        const label = document.getElementById('scanLabel');
        if (!el) return;
        el.classList.remove('state-red', 'state-blue', 'state-green');
        el.classList.add('state-' + state);
        rectState = state;
        if (label) {
          if (state === 'red') label.textContent = 'Align barcode within frame';
          else if (state === 'blue') label.textContent = 'Barcode detected...';
          else if (state === 'green') label.textContent = 'Scanned!';
        }
      }
      function onScanError() {
        if (rectState !== 'red') setRectState('red');
      }
      function onScanSuccess(text) {
        const now = Date.now();
        setRectState('blue');
        if (text === lastScan && now - lastScanTime < DEBOUNCE_MS) return;
        lastScan = text;
        lastScanTime = now;
        setRectState('green');
        showFeedback();
        if (mode === "plotSerial") {
          if (scanStep === "plot") {
            tempPlot = text;
            scanStep = "serial";
            updateScanStatus();
          } else {
            entries.push({
              num: entries.length + 1,
              plot: tempPlot,
              serial: text,
            });
            tempPlot = "";
            scanStep = "plot";
            updateScanStatus();
          }
        } else {
          entries.push({ num: entries.length + 1, plot: "", serial: text });
        }
      }
      function showFeedback() {
        const el = document.getElementById("scanFeedback");
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 600);
        setTimeout(() => setRectState('red'), 1200);
      }
      function finishScanning() {
        if (scanner) {
          scanner.stop().catch(() => {});
          scanner = null;
        }
        showResults();
      }
      function showResults() {
        showScreen("resultsScreen");
        const container = document.getElementById("resultsContainer");
        if (!entries.length) {
          container.innerHTML = '<div class="no-data">No scans recorded.</div>';
          return;
        }
        let html =
          "<table><tr><th>Number</th><th>Plot Information</th><th>Serial Number</th></tr>";
        entries.forEach((e) => {
          const plot = e.plot ? e.plot : '<span class="empty-plot">—</span>';
          html += `<tr><td>${e.num}</td><td>${plot}</td><td>${e.serial}</td></tr>`;
        });
        html += "</table>";
        container.innerHTML = html;
      }
      function buildCSV() {
        let csv = "Number,Plot Information,Serial Number\n";
        entries.forEach((e) => {
          const plot = e.plot ? `"${e.plot.replace(/"/g, '""')}"` : "";
          const serial = `"${e.serial.replace(/"/g, '""')}"`;
          csv += `${e.num},${plot},${serial}\n`;
        });
        return csv;
      }
      function downloadCSV() {
        const blob = new Blob([buildCSV()], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "scan_results.csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }
      async function shareResults() {
        const csv = buildCSV();
        const blob = new Blob([csv], { type: "text/csv" });
        const file = new File([blob], "scan_results.csv", { type: "text/csv" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: "Scan Results" });
            return;
          } catch (e) {
            console.error(e);
          }
        }
        const text = entries
          .map((e) => `${e.num}. Plot: ${e.plot || "-"} | Serial: ${e.serial}`)
          .join("\n");
        const textBlob = new Blob([text], { type: "text/plain" });
        const textFile = new File([textBlob], "scan_results.txt", {
          type: "text/plain",
        });
        if (navigator.canShare && navigator.canShare({ files: [textFile] })) {
          try {
            await navigator.share({ files: [textFile], title: "Scan Results" });
            return;
          } catch (e) {
            console.error(e);
          }
        }
        alert("Web Share not supported. Use Download CSV instead.");
      }
      function restart() {
        entries = [];
        tempPlot = "";
        lastScan = "";
        lastScanTime = 0;
        showScreen("startScreen");
      }
    </script>
  </body>
</html>
