<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Charger Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #f2f2f7;
        color: #1c1c1e;
        height: 100vh;
        overflow: hidden;
      }
      .screen {
        display: none;
        width: 100%;
        height: 100%;
        flex-direction: column;
      }
      .screen.active {
        display: flex;
      }
      #startScreen {
        justify-content: center;
        align-items: center;
        padding: 24px;
        text-align: center;
      }
      #startScreen h1 {
        font-size: 28px;
        margin-bottom: 8px;
        color: #007aff;
      }
      #startScreen p {
        font-size: 16px;
        color: #8e8e93;
        margin-bottom: 40px;
      }
      .mode-btn {
        width: 100%;
        max-width: 320px;
        padding: 20px;
        margin-bottom: 16px;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 14px;
        background: #007aff;
        color: #fff;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .mode-btn:active {
        background: #0051d5;
      }
      #scannerScreen {
        background: #fff;
        padding: 24px 18px 28px;
        justify-content: center;
        align-items: center;
        gap: 18px;
      }
      #scannerTopBar {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
      }
      #scanStatus {
        color: #1c1c1e;
        font-size: 24px;
        font-weight: 700;
      }
      #reader {
        width: min(92vw, 560px);
        aspect-ratio: 4 / 3;
        border-radius: 16px;
        border: 1px solid #d1d1d6;
        background: #111;
        object-fit: cover;
      }
      .scanner-actions {
        display: flex;
        gap: 12px;
        width: min(92vw, 560px);
      }
      .scanner-actions button {
        flex: 1;
        padding: 14px 16px;
        font-size: 17px;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        color: #fff;
        cursor: pointer;
      }
      #scanBtn {
        background: #007aff;
      }
      #scanBtn:disabled {
        background: #8e8e93;
        cursor: default;
      }
      #doneBtn {
        background: #ff3b30;
      }
      #scanFeedback {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 16px 28px;
        background: rgba(52, 199, 89, 0.9);
        color: #fff;
        font-size: 20px;
        font-weight: 700;
        border-radius: 12px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 20;
      }
      #scanFeedback.show {
        opacity: 1;
      }
      #resultsScreen {
        padding: 16px;
        overflow-y: auto;
      }
      #resultsScreen h2 {
        font-size: 22px;
        margin-bottom: 12px;
        text-align: center;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 16px;
        font-size: 15px;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #e5e5ea;
      }
      th {
        background: #007aff;
        color: #fff;
        font-weight: 600;
      }
      td {
        color: #1c1c1e;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .empty-plot {
        color: #c7c7cc;
        font-style: italic;
      }
      .results-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .results-actions button {
        padding: 14px 22px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      #shareBtn {
        background: #34c759;
        color: #fff;
      }
      #downloadBtn {
        background: #5856d6;
        color: #fff;
      }
      #restartBtn {
        background: #8e8e93;
        color: #fff;
      }
      .no-data {
        text-align: center;
        color: #8e8e93;
        padding: 40px 16px;
        font-size: 16px;
      }
      #versionCounter {
        position: absolute;
        bottom: 16px;
        right: 16px;
        font-size: 13px;
        color: #8e8e93;
      }
    </style>
  </head>
  <body>
    <div id="startScreen" class="screen active">
      <h1>Charger Scanner</h1>
      <p>Select scanning mode</p>
      <button class="mode-btn" onclick="startMode('plotSerial')">
        Plot + Serial Number
      </button>
      <button class="mode-btn" onclick="startMode('serialOnly')">
        Only Serial Number
      </button>
      <div id="versionCounter">v1.0</div>
    </div>
    <div id="scannerScreen" class="screen">
      <div id="scannerTopBar">
        <span id="scanStatus">Scan Plot</span>
      </div>
      <video id="reader" playsinline muted></video>
      <div class="scanner-actions">
        <button id="scanBtn" onclick="triggerScan()">Scan</button>
        <button id="doneBtn" onclick="finishScanning()">Done</button>
      </div>
      <div id="scanFeedback">Accepted</div>
    </div>
    <div id="resultsScreen" class="screen">
      <h2>Scan Results</h2>
      <div id="resultsContainer"></div>
      <div class="results-actions">
        <button id="shareBtn" onclick="shareResults()">Share as File</button>
        <button id="downloadBtn" onclick="downloadCSV()">Download CSV</button>
        <button id="restartBtn" onclick="restart()">Start Over</button>
      </div>
    </div>
    <script>
      let mode = "",
        entries = [],
        tempPlot = "",
        scanStep = "plot",
        codeReader = null,
        scanControls = null,
        lastScan = "",
        lastScanTime = 0;
      const DEBOUNCE_MS = 1500;
      const MANUAL_SCAN_TIMEOUT_MS = 2500;
      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }
      function startMode(m) {
        mode = m;
        entries = [];
        tempPlot = "";
        scanStep = mode === "plotSerial" ? "plot" : "serial";
        lastScan = "";
        lastScanTime = 0;
        updateScanStatus();
        showScreen("scannerScreen");
        startCamera();
      }
      function updateScanStatus() {
        document.getElementById("scanStatus").textContent =
          scanStep === "plot" ? "Scan Plot" : "Scan SN";
      }
      let scanRequested = false;
      let scanRequestTimer = null;
      function startCamera() {
        resetScanButton(true);
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
          ZXing.BarcodeFormat.CODE_128,
        ]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

        codeReader = new ZXingBrowser.BrowserMultiFormatReader(hints);
        const video = document.getElementById("reader");

        codeReader
          .decodeFromConstraints(
            {
              audio: false,
              video: {
                facingMode: { ideal: "environment" },
                width: { ideal: 1920 },
                height: { ideal: 1080 },
              },
            },
            video,
            (result, error, controls) => {
              if (controls && !scanControls) scanControls = controls;
              if (!scanRequested) return;
              if (result) {
                scanRequested = false;
                clearScanRequestTimer();
                resetScanButton(false);
                onScanSuccess(result.getText());
                return;
              }
              if (error) {
                return;
              }
            }
          )
          .then(() => {
            resetScanButton(false);
          })
          .catch((e) => {
            resetScanButton(false);
            alert("Camera start failed: " + e);
          });
      }
      function clearScanRequestTimer() {
        if (!scanRequestTimer) return;
        clearTimeout(scanRequestTimer);
        scanRequestTimer = null;
      }
      function resetScanButton(disabled) {
        const btn = document.getElementById("scanBtn");
        if (!btn) return;
        btn.disabled = disabled;
        btn.textContent = disabled ? "Starting..." : "Scan";
      }
      function triggerScan() {
        if (!codeReader || !scanControls) return;
        scanRequested = true;
        const btn = document.getElementById("scanBtn");
        if (btn) {
          btn.disabled = true;
          btn.textContent = "Scanning...";
        }
        clearScanRequestTimer();
        scanRequestTimer = setTimeout(() => {
          if (!scanRequested) return;
          scanRequested = false;
          resetScanButton(false);
          alert("No CODE_128 barcode found. Try again.");
        }, MANUAL_SCAN_TIMEOUT_MS);
      }
      function onScanSuccess(text) {
        const now = Date.now();
        if (text === lastScan && now - lastScanTime < DEBOUNCE_MS) {
          return;
        }
        lastScan = text;
        lastScanTime = now;
        showFeedback();
        if (mode === "plotSerial") {
          if (scanStep === "plot") {
            tempPlot = text;
            scanStep = "serial";
            updateScanStatus();
          } else {
            entries.push({
              num: entries.length + 1,
              plot: tempPlot,
              serial: text,
            });
            tempPlot = "";
            scanStep = "plot";
            updateScanStatus();
          }
        } else {
          entries.push({ num: entries.length + 1, plot: "", serial: text });
        }
      }
      function showFeedback() {
        const el = document.getElementById("scanFeedback");
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 600);
      }
      function finishScanning() {
        stopCamera();
        showResults();
      }
      function stopCamera() {
        scanRequested = false;
        clearScanRequestTimer();
        resetScanButton(false);
        if (scanControls) {
          scanControls.stop();
          scanControls = null;
        }
        if (codeReader) {
          codeReader.reset();
          codeReader = null;
        }
      }
      function showResults() {
        showScreen("resultsScreen");
        const container = document.getElementById("resultsContainer");
        if (!entries.length) {
          container.innerHTML = '<div class="no-data">No scans recorded.</div>';
          return;
        }
        let html =
          "<table><tr><th>Number</th><th>Plot Information</th><th>Serial Number</th></tr>";
        entries.forEach((e) => {
          const plot = e.plot ? e.plot : '<span class="empty-plot">—</span>';
          html += `<tr><td>${e.num}</td><td>${plot}</td><td>${e.serial}</td></tr>`;
        });
        html += "</table>";
        container.innerHTML = html;
      }
      function buildCSV() {
        let csv = "Number,Plot Information,Serial Number\n";
        entries.forEach((e) => {
          const plot = e.plot ? `"${e.plot.replace(/"/g, '""')}"` : "";
          const serial = `"${e.serial.replace(/"/g, '""')}"`;
          csv += `${e.num},${plot},${serial}\n`;
        });
        return csv;
      }
      function downloadCSV() {
        const blob = new Blob([buildCSV()], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "scan_results.csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }
      async function shareResults() {
        const csv = buildCSV();
        const blob = new Blob([csv], { type: "text/csv" });
        const file = new File([blob], "scan_results.csv", { type: "text/csv" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: "Scan Results" });
            return;
          } catch (e) {
            console.error(e);
          }
        }
        const text = entries
          .map((e) => `${e.num}. Plot: ${e.plot || "-"} | Serial: ${e.serial}`)
          .join("\n");
        const textBlob = new Blob([text], { type: "text/plain" });
        const textFile = new File([textBlob], "scan_results.txt", {
          type: "text/plain",
        });
        if (navigator.canShare && navigator.canShare({ files: [textFile] })) {
          try {
            await navigator.share({ files: [textFile], title: "Scan Results" });
            return;
          } catch (e) {
            console.error(e);
          }
        }
        alert("Web Share not supported. Use Download CSV instead.");
      }
      function restart() {
        stopCamera();
        entries = [];
        tempPlot = "";
        lastScan = "";
        lastScanTime = 0;
        showScreen("startScreen");
      }
    </script>
  </body>
</html>
