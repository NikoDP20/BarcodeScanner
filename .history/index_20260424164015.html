<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Charger Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #f2f2f7;
        color: #1c1c1e;
        height: 100vh;
        overflow: hidden;
      }

      .screen {
        display: none;
        width: 100%;
        height: 100%;
        flex-direction: column;
      }

      .screen.active {
        display: flex;
      }

      #startScreen {
        justify-content: center;
        align-items: center;
        padding: 24px;
        text-align: center;
      }

      #startScreen h1 {
        font-size: 28px;
        margin-bottom: 8px;
        color: #007aff;
      }

      #startScreen p {
        font-size: 16px;
        color: #8e8e93;
        margin-bottom: 40px;
      }

      .mode-btn {
        width: 100%;
        max-width: 320px;
        padding: 20px;
        margin-bottom: 16px;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 14px;
        background: #007aff;
        color: #fff;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      .mode-btn:active {
        background: #0051d5;
      }

      #scannerScreen {
        background: #fff;
        padding: 24px 18px 28px;
        justify-content: center;
        align-items: center;
        gap: 18px;
      }

      #scannerTopBar {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
      }

      #scanStatus {
        color: #1c1c1e;
        font-size: 24px;
        font-weight: 700;
      }

      #reader {
        width: min(92vw, 560px);
        aspect-ratio: 4 / 3;
        border-radius: 16px;
        border: 1px solid #d1d1d6;
        background: #111;
        position: relative;
        overflow: hidden;
      }

      #reader video,
      #reader canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #reader canvas {
        display: none !important;
      }

      .scanner-actions {
        display: flex;
        gap: 12px;
        width: min(92vw, 560px);
      }

      .scanner-actions button {
        flex: 1;
        padding: 14px 16px;
        font-size: 17px;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        color: #fff;
        cursor: pointer;
      }

      #scanBtn {
        background: #007aff;
      }

      #scanBtn:disabled {
        background: #8e8e93;
        cursor: default;
      }

      #doneBtn {
        background: #ff3b30;
      }

      #scanFeedback {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 16px 28px;
        background: rgba(52, 199, 89, 0.9);
        color: #fff;
        font-size: 20px;
        font-weight: 700;
        border-radius: 12px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 20;
      }

      #scanFeedback.show {
        opacity: 1;
      }

      #resultsScreen {
        padding: 16px;
        overflow-y: auto;
      }

      #resultsScreen h2 {
        font-size: 22px;
        margin-bottom: 12px;
        text-align: center;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 16px;
        font-size: 15px;
      }

      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #e5e5ea;
      }

      th {
        background: #007aff;
        color: #fff;
        font-weight: 600;
      }

      td {
        color: #1c1c1e;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .empty-plot {
        color: #c7c7cc;
        font-style: italic;
      }

      .results-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .results-actions button {
        padding: 14px 22px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      #shareBtn {
        background: #34c759;
        color: #fff;
      }

      #downloadBtn {
        background: #5856d6;
        color: #fff;
      }

      #restartBtn {
        background: #8e8e93;
        color: #fff;
      }

      .no-data {
        text-align: center;
        color: #8e8e93;
        padding: 40px 16px;
        font-size: 16px;
      }

      #versionCounter {
        position: absolute;
        bottom: 16px;
        right: 16px;
        font-size: 13px;
        color: #8e8e93;
      }

      #qrModal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.9);
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      #qrModal.active {
        display: flex;
      }

      #qrModal h3 {
        color: #fff;
        margin-bottom: 16px;
        font-size: 18px;
      }

      #qrReader {
        width: min(80vw, 400px);
        aspect-ratio: 1;
        border-radius: 16px;
        overflow: hidden;
        background: #000;
      }

      #qrModal .qr-actions {
        margin-top: 16px;
        display: flex;
        gap: 12px;
      }

      #qrModal .qr-actions button {
        padding: 14px 24px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
      }

      #cancelQrBtn {
        background: #8e8e93;
        color: #fff;
      }

      #skipQrBtn {
        background: #007aff;
        color: #fff;
      }

      #scanQrBtn {
        background: #34c759;
        color: #fff;
      }

      #scanQrBtn:disabled {
        background: #8e8e93;
        cursor: default;
      }

      #qrModal .qr-actions {
        margin-top: 16px;
        display: flex;
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <div id="startScreen" class="screen active">
      <h1>Charger Scanner</h1>
      <p>Select scanning mode</p>
      <button class="mode-btn" onclick="startMode('plotSerial')">
        Plot + Serial Number
      </button>
      <button class="mode-btn" onclick="startMode('serialOnly')">
        Only Serial Number
      </button>
      <div id="versionCounter">v1.2</div>
    </div>

    <div id="scannerScreen" class="screen">
      <div id="scannerTopBar">
        <span id="scanStatus">Scan Plot</span>
      </div>
      <div id="reader"></div>
      <div class="scanner-actions">
        <button id="scanBtn" onclick="triggerScan()">Scan</button>
        <button id="doneBtn" onclick="finishScanning()">Done</button>
      </div>
      <div id="scanFeedback">Accepted</div>
    </div>

    <div id="resultsScreen" class="screen">
      <h2>Scan Results</h2>
      <div id="resultsContainer"></div>
      <div class="results-actions">
        <button id="shareBtn" onclick="startShareWithQR()">Share as File</button>
        <button id="downloadBtn" onclick="downloadCSV()">Download CSV</button>
        <button id="restartBtn" onclick="restart()">Start Over</button>
      </div>
    </div>

    <div id="qrModal">
      <h3>Scan QR code for share message (optional)</h3>
      <div id="qrReader"></div>
      <div class="qr-actions">
        <button id="cancelQrBtn" onclick="cancelQrScan()">Cancel</button>
        <button id="scanQrBtn" onclick="triggerQrScan()">Scan</button>
        <button id="skipQrBtn" onclick="skipQrScan()">Skip / No QR</button>
      </div>
    </div>

    <script>
      let mode = "";
      let entries = [];
      let tempPlot = "";
      let scanStep = "plot";
      let quaggaStarted = false;
      let lastScan = "";
      let lastScanTime = 0;
      let scanRequested = false;
      let scanRequestTimer = null;
      let qrScanner = null;
      let pendingShareBlob = null;
      let pendingShareFile = null;
      let qrScanRequested = false;
      let qrScanTimer = null;

      const DEBOUNCE_MS = 1500;
      const MANUAL_SCAN_TIMEOUT_MS = 2500;

      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      function updateScanStatus() {
        document.getElementById("scanStatus").textContent =
          scanStep === "plot" ? "Scan Plot" : "Scan SN";
      }

      function clearScanRequestTimer() {
        if (!scanRequestTimer) return;
        clearTimeout(scanRequestTimer);
        scanRequestTimer = null;
      }

      function resetScanButton(disabled) {
        const btn = document.getElementById("scanBtn");
        if (!btn) return;
        btn.disabled = disabled;
        btn.textContent = disabled ? "Starting..." : "Scan";
      }

      async function getRearCameraConstraint() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          return {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
          };
        }

        try {
          const warmupStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false,
          });
          warmupStream.getTracks().forEach((t) => t.stop());

          const devices = await navigator.mediaDevices.enumerateDevices();
          const cameras = devices.filter((d) => d.kind === "videoinput");

          const rear = cameras.find((c) => {
            const label = (c.label || "").toLowerCase();
            return (
              label.includes("back") ||
              label.includes("rear") ||
              label.includes("environment")
            );
          });

          if (rear && rear.deviceId) {
            return {
              deviceId: { exact: rear.deviceId },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            };
          }
        } catch (e) {
          return {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
          };
        }

        return {
          facingMode: { ideal: "environment" },
          width: { ideal: 1920 },
          height: { ideal: 1080 },
        };
      }

      function initQuagga(target, videoConstraint) {
        return new Promise((resolve, reject) => {
          Quagga.init(
            {
              inputStream: {
                name: "Live",
                type: "LiveStream",
                target: target,
                constraints: videoConstraint,
              },
              locator: {
                patchSize: "x-small",
                halfSample: false,
              },
              numOfWorkers:
                navigator.hardwareConcurrency
                  ? Math.min(4, navigator.hardwareConcurrency)
                  : 2,
              frequency: 20,
              decoder: {
                readers: ["code_128_reader"],
                multiple: false,
              },
              locate: false,
            },
            function (err) {
              if (err) {
                reject(err);
                return;
              }
              resolve();
            }
          );
        });
      }

      async function startCamera() {
        resetScanButton(true);

        const target = document.getElementById("reader");
        if (!target) {
          resetScanButton(false);
          return;
        }

        target.innerHTML = "";

        if (!window.Quagga) {
          resetScanButton(false);
          alert("Scanner library failed to load.");
          return;
        }

        const preferredConstraint = await getRearCameraConstraint();
        const constraintsToTry = [
          preferredConstraint,
          {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
          },
          {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 },
          },
          true,
        ];

        let started = false;

        for (const constraint of constraintsToTry) {
          try {
            await initQuagga(target, constraint);
            started = true;
            break;
          } catch (e) {
            try {
              Quagga.stop();
            } catch (stopErr) {}
            target.innerHTML = "";
          }
        }

        if (!started) {
          resetScanButton(false);
          alert(
            "Camera start failed. Check camera permissions in browser settings."
          );
          return;
        }

        Quagga.offDetected(handleQuaggaDetected);
        Quagga.onDetected(handleQuaggaDetected);
        Quagga.start();
        quaggaStarted = true;

        const video = target.querySelector("video");
        if (video) {
          video.setAttribute("playsinline", "true");
          video.setAttribute("webkit-playsinline", "true");
          video.setAttribute("autoplay", "true");
          video.muted = true;
          video.play().catch(() => {});
        }

        resetScanButton(false);
      }

      function handleQuaggaDetected(result) {
        if (!scanRequested) return;

        const text = result && result.codeResult ? result.codeResult.code : "";
        if (!text) return;

        scanRequested = false;
        clearScanRequestTimer();
        resetScanButton(false);
        onScanSuccess(text);
      }

      function beginScanAttempt(isRetry = false) {
        if (!quaggaStarted) return;
        scanRequested = true;

        const btn = document.getElementById("scanBtn");
        if (btn) {
          btn.disabled = true;
          btn.textContent = isRetry ? "Retrying..." : "Scanning...";
        }

        clearScanRequestTimer();
        scanRequestTimer = setTimeout(() => {
          if (!scanRequested || !quaggaStarted) return;
          beginScanAttempt(true);
        }, MANUAL_SCAN_TIMEOUT_MS);
      }

      function triggerScan() {
        if (!quaggaStarted || scanRequested) return;
        beginScanAttempt(false);
      }

      function onScanSuccess(text) {
        const now = Date.now();
        if (text === lastScan && now - lastScanTime < DEBOUNCE_MS) return;

        lastScan = text;
        lastScanTime = now;
        showFeedback();

        if (mode === "plotSerial") {
          if (scanStep === "plot") {
            tempPlot = text;
            scanStep = "serial";
            updateScanStatus();
            return;
          }

          entries.push({
            num: entries.length + 1,
            plot: tempPlot,
            serial: text,
          });

          tempPlot = "";
          scanStep = "plot";
          updateScanStatus();
          return;
        }

        entries.push({
          num: entries.length + 1,
          plot: "",
          serial: text,
        });
      }

      function showFeedback() {
        const el = document.getElementById("scanFeedback");
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 600);
      }

      function stopCamera() {
        scanRequested = false;
        clearScanRequestTimer();
        resetScanButton(false);

        if (window.Quagga) {
          Quagga.offDetected(handleQuaggaDetected);
          if (quaggaStarted) {
            Quagga.stop();
            quaggaStarted = false;
          }
        }

        const target = document.getElementById("reader");
        if (target) target.innerHTML = "";
      }

      function startMode(m) {
        mode = m;
        entries = [];
        tempPlot = "";
        scanStep = mode === "plotSerial" ? "plot" : "serial";
        lastScan = "";
        lastScanTime = 0;
        updateScanStatus();
        showScreen("scannerScreen");
        startCamera();
      }

      function finishScanning() {
        stopCamera();
        showResults();
      }

      function showResults() {
        showScreen("resultsScreen");
        const container = document.getElementById("resultsContainer");

        if (!entries.length) {
          container.innerHTML = '<div class="no-data">No scans recorded.</div>';
          return;
        }

        let html =
          "<table><tr><th>Number</th><th>Plot Information</th><th>Serial Number</th></tr>";

        entries.forEach((e) => {
          const plot = e.plot ? e.plot : '<span class="empty-plot">—</span>';
          html += `<tr><td>${e.num}</td><td>${plot}</td><td>${e.serial}</td></tr>`;
        });

        html += "</table>";
        container.innerHTML = html;
      }

      function buildCSV() {
        let csv = "Number,Plot Information,Serial Number\n";

        entries.forEach((e) => {
          const plot = e.plot ? `"${e.plot.replace(/"/g, '""')}"` : "";
          const serial = `"${e.serial.replace(/"/g, '""')}"`;
          csv += `${e.num},${plot},${serial}\n`;
        });

        return csv;
      }

      function downloadCSV() {
        const blob = new Blob([buildCSV()], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "scan_results.csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function buildShareCSV() {
        let csv = "Number,Results\n";

        if (mode !== "plotSerial") {
          entries.forEach((e) => {
            const serial = `"${e.serial.replace(/"/g, '""')}"`;
            csv += `${e.num},${serial}\n`;
          });
          return csv;
        }

        entries.forEach((e) => {
          const plot = e.plot ? `"${e.plot.replace(/"/g, '""')}"` : "\"\"";
          const serial = `"${e.serial.replace(/"/g, '""')}"`;
          csv += `${e.num},${plot}\n`;
          csv += `${e.num},${serial}\n`;
        });

        return csv;
      }

      async function startShareWithQR() {
        const csv = buildShareCSV();
        pendingShareBlob = new Blob([csv], { type: "text/csv" });
        pendingShareFile = new File([pendingShareBlob], "scan_results.csv", { type: "text/csv" });

        document.getElementById("qrModal").classList.add("active");

        const qrReader = document.getElementById("qrReader");
        qrReader.innerHTML = "";

        if (!window.Html5Qrcode) {
          skipQrScan();
          return;
        }

        qrScanner = new Html5Qrcode("qrReader");

        const config = {
          fps: 30,
          qrbox: { width: 280, height: 280 },
          aspectRatio: 1,
        };

        const cameraConfig = {
          facingMode: "environment",
          width: { ideal: 1920, min: 1280 },
          height: { ideal: 1080, min: 720 },
        };

        try {
          await qrScanner.start(
            cameraConfig,
            config,
            onQrDetected,
            () => {}
          );
        } catch (e) {
          console.error("QR start failed:", e);
          skipQrScan();
        }
      }

      function onQrDetected(decodedText) {
        if (!qrScanRequested) return;
        qrScanRequested = false;
        clearQrScanTimer();
        updateQrScanButton(false);
        onQrSuccess(decodedText);
      }

      function onQrSuccess(decodedText) {
        stopQrScanner();
        document.getElementById("qrModal").classList.remove("active");
        completeShare(decodedText);
      }

      function triggerQrScan() {
        if (!qrScanner) return;
        qrScanRequested = true;
        updateQrScanButton(true);

        clearQrScanTimer();
        qrScanTimer = setTimeout(() => {
          if (!qrScanRequested) return;
          qrScanRequested = false;
          updateQrScanButton(false);
        }, 4000);
      }

      function updateQrScanButton(scanning) {
        const btn = document.getElementById("scanQrBtn");
        if (!btn) return;
        btn.disabled = scanning;
        btn.textContent = scanning ? "Scanning..." : "Scan";
      }

      function clearQrScanTimer() {
        if (!qrScanTimer) return;
        clearTimeout(qrScanTimer);
        qrScanTimer = null;
      }

      function cancelQrScan() {
        qrScanRequested = false;
        clearQrScanTimer();
        updateQrScanButton(false);
        stopQrScanner();
        document.getElementById("qrModal").classList.remove("active");
        pendingShareBlob = null;
        pendingShareFile = null;
      }

      function skipQrScan() {
        qrScanRequested = false;
        clearQrScanTimer();
        updateQrScanButton(false);
        stopQrScanner();
        document.getElementById("qrModal").classList.remove("active");
        completeShare("");
      }

      async function stopQrScanner() {
        if (qrScanner) {
          try {
            await qrScanner.stop();
          } catch (e) {}
          qrScanner = null;
        }
      }

      async function completeShare(messageText) {
        if (!pendingShareFile) return;

        const file = pendingShareFile;
        const msg = messageText || undefined;

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({
              files: [file],
              title: "Scan Results",
              text: msg,
            });
            pendingShareBlob = null;
            pendingShareFile = null;
            return;
          } catch (e) {
            console.error(e);
          }
        }

        const text = entries
          .map((e) => `${e.num}. Plot: ${e.plot || "-"} | Serial: ${e.serial}`)
          .join("\n");

        const textBlob = new Blob([text], { type: "text/plain" });
        const textFile = new File([textBlob], "scan_results.txt", {
          type: "text/plain",
        });

        if (navigator.canShare && navigator.canShare({ files: [textFile] })) {
          try {
            await navigator.share({
              files: [textFile],
              title: "Scan Results",
              text: msg,
            });
            pendingShareBlob = null;
            pendingShareFile = null;
            return;
          } catch (e) {
            console.error(e);
          }
        }

        alert("Web Share not supported. Use Download CSV instead.");
        pendingShareBlob = null;
        pendingShareFile = null;
      }

      function restart() {
        stopCamera();
        entries = [];
        tempPlot = "";
        lastScan = "";
        lastScanTime = 0;
        showScreen("startScreen");
      }
    </script>
  </body>
